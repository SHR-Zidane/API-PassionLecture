version: '3.8'

services:
  # Service pour la base de données MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: db_api
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user_express
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
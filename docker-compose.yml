version: '3.8'

services:
  # Service pour la base de données MySQL [cite: 117]
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: db_api
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user_express
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Service phpMyAdmin pour l'interface visuelle
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_gui
    restart: always
    ports:
      - "8080:80" # Accès via http://localhost:8080
    environment:
      - PMA_ARBITRARY=1 # Permet de se connecter à n'importe quel serveur
      - PMA_HOST=db     # Lie le service au container 'db' ci-dessus
      - PMA_USER=root   # Utilisateur par défaut pour le dev
      - PMA_PASSWORD=root
    depends_on:
      - db

volumes:
  db_data: